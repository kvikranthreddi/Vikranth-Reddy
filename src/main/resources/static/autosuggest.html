<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Being Infinity</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#b6d7ff 0%,transparent 40%),
        radial-gradient(circle at bottom right,#d6c8ff 0%,transparent 35%),
        linear-gradient(135deg,#edf6ff,#f8fbff);
}

.container{
    width:800px;
    padding:60px;
    border-radius:30px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(20px);
    box-shadow:0 25px 70px rgba(0,0,0,.10);
    text-align:center;
    position:relative;
}

/* Settings Button */

.settings{
    position:absolute;
    top:25px;
    right:25px;
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 20px;
    border-radius:50px;
    background:white;
    border:1px solid #e6ecff;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.settings:hover{
    background:linear-gradient(135deg,#2563eb,#4f8cff);
    color:white;
    transform:translateY(-4px);
}

.gear{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    transition:.5s;
}

.settings:hover .gear{
    transform:rotate(180deg);
    background:white;
    color:#2563eb;
}

/* Status */

.status{
    display:inline-flex;
    align-items:center;
    gap:12px;
    padding:12px 24px;
    border-radius:40px;
    background:#f4f8ff;
    border:1px solid #dbeafe;
    color:#475569;
    margin-bottom:35px;
    font-weight:500;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
box-shadow:0 0 0 0 rgba(34,197,94,.5);
}

70%{
box-shadow:0 0 0 10px rgba(34,197,94,0);
}

100%{
box-shadow:0 0 0 0 rgba(34,197,94,0);
}

}

/* Heading */

h1{
    font-size:52px;
    margin-bottom:15px;
    color:#1e293b;
}

.gradient{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:#64748b;
    font-size:18px;
    margin-bottom:45px;
    line-height:1.7;
}

/* Search Bar */

.search-box{
    display:flex;
    align-items:center;
    background:white;
    border:2px solid #dbeafe;
    border-radius:60px;
    padding:18px 24px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    transition:.35s;
}

.search-box:hover{
    border-color:#3b82f6;
    box-shadow:0 18px 40px rgba(37,99,235,.18);
}

.search-box span{
    font-size:24px;
    margin-right:16px;
}

.search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:18px;
    background:transparent;
}

.search-box input::placeholder{
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

    <div class="settings">
        <div class="gear">⚙</div>
        <span>Settings</span>
    </div>

    <div class="status">
        <div class="dot"></div>
        Online • ⚡ 0 ms
    </div>

    <h1>
        Being <span class="gradient">Infinity</span>
    </h1>

    <p>
        One million phrases. Four algorithms. Prefix-based autosuggest.
    </p>

    <div class="search-box">
        <span>🔍</span>
        <input
            type="text"
            placeholder="Start typing to search phrases..."
        >
    </div>

</div>

</body>
</html>
